<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodsaver - Aplicación de recetas</title>
    <meta name="description" content="Foodsaver: Tu aplicación para gestionar recetas y ahorrar comida">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Región WCAG 2.1.1: aria-live para anuncios a screen readers -->
    <div id="sr-announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <!-- WCAG 2.1.2: Header con role="banner" para screen readers -->
    <header class="header" role="banner">
        <div class="header__content">
            <!-- Logo: Enlace a inicio -->
            <a 
                href="/" 
                class="logo" 
                aria-label="Foodsaver - Ir a inicio"
            >
                <div class="logo__icon" aria-hidden="true">
                    <img 
                        src="https://www.figma.com/api/mcp/asset/7ba50075-b1f1-48b6-a6b8-eac472c721ff" 
                        alt="" 
                        aria-hidden="true"
                    >
                </div>
                <span class="logo__text">FOODSAVER</span>
            </a>

            <!-- Navegación: aria-current="page" en enlace activo -->
            <nav class="nav" aria-label="Navegación principal">
                <a 
                    href="/" 
                    class="nav__link nav__link--active" 
                    aria-current="page"
                >
                    Inicio
                </a>
                <a href="/recetas" class="nav__link">
                    Recetas
                </a>
                <a href="/como-funciona" class="nav__link">
                    Cómo funciona
                </a>
            </nav>

            <!-- Carrito: aria-label dinámico + contador con aria-live -->
            <button 
                class="cart" 
                aria-label="Carrito de compras (0 artículos)"
            >
                <img 
                    src="https://www.figma.com/api/mcp/asset/7ba50075-b1f1-48b6-a6b8-eac472c721ff" 
                    alt="Carrito" 
                    aria-hidden="true"
                >
                <span 
                    class="cart__count" 
                    aria-live="polite"
                    role="status"
                >
                    0
                </span>
            </button>
        </div>
    </header>

    <main>
        <!-- Contenido principal de la aplicación -->
    </main>

    <script src="js/script.js"></script>
</body>
</html>
