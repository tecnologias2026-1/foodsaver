<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Foodsaver</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/header.js"></script>
</head>
<body>
    <header class="site-header" role="banner">
        <div class="container header-inner">
            <a href="/" class="brand" aria-label="Foodsaver — Inicio">
                <img src="assets/icons/Foodsaver.png" class="brand__icon" width="36" height="36" alt="Logo Foodsaver">
                <span class="brand__name">FOODSAVER</span>
            </a>

            <nav class="main-nav" role="navigation" aria-label="Navegación principal">
                <ul class="nav__list">
                    <li class="nav__item"><a class="nav__link" href="#">Inicio</a></li>
                    <li class="nav__item"><a class="nav__link" href="#">Recetas</a></li>
                    <li class="nav__item"><a class="nav__link" href="#">Cómo funciona</a></li>
                </ul>
            </nav>

            <div class="header-actions" aria-hidden="false">
                <a href="#cart" class="cart" aria-label="Ver carrito">
                    <img src="assets/icons/Shopping_Bag.png" alt="" aria-hidden="true" width="24" height="24">
                </a>

                <button class="menu-toggle" aria-controls="mobile-menu" aria-expanded="false" aria-label="Abrir menú">
                    <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/></svg>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="mobile-menu" hidden>
            <div class="mobile-card" role="dialog" aria-modal="true" aria-labelledby="mobile-menu-title">
                <header class="mobile-card__header">
                    <h2 id="mobile-menu-title" class="mobile-title">Menú</h2>
                    <button class="mobile-close" aria-label="Cerrar menú">
                        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.29 19.71 2.88 18.29 9.17 12 2.88 5.71 4.29 4.29 10.59 10.6 16.88 4.29z"/></svg>
                    </button>
                </header>

                <nav class="mobile-nav" aria-label="Navegación móvil">
                    <ul class="mobile-nav__list">
                        <li><a href="#" class="mobile-nav__link">Inicio</a></li>
                        <li><a href="#" class="mobile-nav__link">Recetas</a></li>
                        <li><a href="#" class="mobile-nav__link">Cómo funciona</a></li>
                    </ul>
                </nav>

                <a href="#cart" class="mobile-cart" aria-label="Ver carrito">
                    <img src="assets/icons/Shopping_Bag.png" alt="" aria-hidden="true" width="20" height="20">
                    <span class="mobile-cart__text">Carrito</span>
                </a>
            </div>
        </div>
    </header>

    <main id="content" tabindex="-1">
        <!-- Contenido de la página -->
    </main>
</body>
</html>
