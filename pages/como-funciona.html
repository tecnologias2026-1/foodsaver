<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Configuración básica del documento -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cómo funciona — Foodsaver</title>

    <!-- Hoja de estilos principal (modular) -->
    <link rel="stylesheet" href="../css/base/variables.css">
    <link rel="stylesheet" href="../css/base/reset.css">
    <link rel="stylesheet" href="../css/layout/header.css">
    <link rel="stylesheet" href="../css/layout/container.css">
    <link rel="stylesheet" href="../css/components/nav.css">
    <link rel="stylesheet" href="../css/components/mobile-menu.css">
    <link rel="stylesheet" href="../css/components/buttons.css">
    <link rel="stylesheet" href="../css/pages/home.css">

    <!-- Script del header: controla menú móvil y estados interactivos -->
    <script defer src="../js/header.js"></script>
</head>
<body>
    <!-- Enlace accesible para saltar directamente al contenido principal -->
    <a class="skip-link sr-only" href="#content">Saltar al contenido</a>

    <!-- Header principal del sitio -->
    <header class="site-header">
        <div class="container header-inner">

            <!-- Logo / marca principal que redirige al inicio -->
            <a href="../index.html" class="brand" aria-label="Foodsaver — Inicio">
                <img
                    src="../assets/icons/Foodsaver.png"
                    class="brand__icon"
                    width="36"
                    height="36"
                    alt="Logo Foodsaver"
                >
                <span class="brand__name">FOODSAVER</span>
            </a>

            <!-- Navegación principal visible en desktop -->
            <nav class="main-nav" aria-label="Navegación principal">
                <ul class="nav__list">
                    <li class="nav__item"><a class="nav__link" href="../index.html">Inicio</a></li>
                    <li class="nav__item"><a class="nav__link" href="recetas.html">Recetas</a></li>
                    <li class="nav__item"><a class="nav__link" href="como-funciona.html">Cómo funciona</a></li>
                </ul>
            </nav>

            <!-- Acciones del header: carrito y botón hamburguesa -->
            <div class="header-actions">

                <!-- Acceso al carrito en desktop -->
                <a href="carrito.html" class="cart" aria-label="Ver carrito">
                    <img
                        src="../assets/icons/Shopping_Bag.png"
                        alt=""
                        aria-hidden="true"
                        width="24"
                        height="24"
                    >
                </a>

                <!-- Botón que abre el menú móvil -->
                <button
                    class="menu-toggle"
                    type="button"
                    aria-controls="mobile-menu"
                    aria-expanded="false"
                    aria-label="Abrir menú"
                >
                    <svg
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <path fill="currentColor" d="M3 6h18v2H3zM3 11h18v2H3zM3 16h18v2H3z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Menú móvil oculto por defecto -->
        <div id="mobile-menu" class="mobile-menu" hidden>

            <!-- Tarjeta central del menú móvil tratada como diálogo accesible -->
            <div class="mobile-card" role="dialog" aria-modal="true" aria-label="Navegación móvil">

                <!-- Cabecera del menú móvil con botón de cierre -->
                <header class="mobile-card__header">
                    <button class="mobile-close" type="button" aria-label="Cerrar menú">
                        <img src="../assets/icons/Close_Menu.png" alt="" aria-hidden="true">
                    </button>
                </header>

                <!-- Navegación en versión móvil -->
                <nav class="mobile-nav" aria-label="Navegación móvil">
                    <ul class="mobile-nav__list">
                        <li><a href="../index.html" class="mobile-nav__link">Inicio</a></li>
                        <li><a href="recetas.html" class="mobile-nav__link">Recetas</a></li>
                        <li><a href="como-funciona.html" class="mobile-nav__link">Cómo funciona</a></li>
                    </ul>
                </nav>

                <!-- Acceso al carrito dentro del menú móvil -->
                <a href="carrito.html" class="mobile-cart" aria-label="Ver carrito">
                    <img
                        src="../assets/icons/Shopping_Bag.png"
                        alt=""
                        aria-hidden="true"
                        width="44"
                        height="44"
                    >
                </a>
            </div>
        </div>
    </header>

    <!-- Contenido principal de la página -->
    <main id="content" tabindex="-1">
Aqui va la explicacion de como funciona
<!-- Aquí irá el contenido propio de cada vista -->
    </main>
</body>
</html>
